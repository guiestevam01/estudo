<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Example</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body>

    <header class="header-main">
        <h1>Form Practices</h1>
    </header>

    <main class="main-content">
        <div class="form-container">
            <h2>Example Form Page</h2>
            <form action="#">
                <div class="form-columns">
                    <div class="form-column-item">
                        <div class="form-group">
                            <label for="example1">Example 1</label>
                            <input type="text" id="example1" placeholder="Content of Example 1">
                        </div>

                        <div class="form-group">
                            <label for="example2">Example 2</label>
                            <input type="email" id="example2" placeholder="Content of Example 2">
                        </div>
                    </div>
                    
                    <div class="form-column-item">
                        <div class="form-group">
                            <label for="example3">Example 3</label>
                            <select id="example3">
                                <option value="">Select an option</option>
                                <option value="opt1">Option 1</option>
                                <option value="opt2">Option 2</option>
                                <option value="opt3">Option 3</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="example4">Example 4</label>
                            <textarea id="example4" rows="5" placeholder="Content of Example 4"></textarea>
                        </div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Example 5 (Checkboxes):</label>
                    <div class="checkbox-radio-group">
                        <label><input type="checkbox" name="example5" value="opt1"> Option A</label>
                        <label><input type="checkbox" name="example5" value="opt2"> Option B</label>
                        <label><input type="checkbox" name="example5" value="opt3"> Option C</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>Example 6 (Radio):</label>
                    <div class="checkbox-radio-group">
                        <label><input type="radio" name="example6" value="opt1"> Option X</label>
                        <label><input type="radio" name="example6" value="opt2"> Option Y</label>
                        <label><input type="radio" name="example6" value="opt3"> Option Z</label>
                    </div>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn success">Send</button>
                    <button type="reset" class="btn warning">Clear</button>
                    <button type="button" class="btn danger">Cancel</button>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
